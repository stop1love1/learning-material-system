# Khởi chạy toàn bộ hệ thống Vườn Văn / Học Viện LMS bằng 1 lệnh:
#
#   docker compose up -d --build
#
# - MongoDB  : nội bộ (cổng 27017 map ra host để tiện debug)
# - Backend  : http://localhost:3001/api   ·  Swagger /api/docs
# - Frontend : http://localhost:3000
#
# Cấu hình (tuỳ chọn) qua file .env cùng cấp — xem .env.example.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/lms
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vuonvan.vn}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Vườn Văn <no-reply@vuonvan.vn>}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* được nhúng lúc build → trình duyệt gọi backend qua localhost host.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_GOOGLE_API_KEY: ${NEXT_PUBLIC_GOOGLE_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo-data:
